name = "cloudchat"
main = "src/index.js"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "cloudchat"
# After running `npx wrangler d1 create cloudchat`, paste the returned database_id below
database_id = "cea9698c-25a1-43b3-a3ee-21999dba9ad4"

# Durable Object for real-time WebSocket broadcast (SQLite-backed, available on the free tier)
[[durable_objects.bindings]]
name = "CHAT"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]
